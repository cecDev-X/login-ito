<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login ITO funcional con validaciones">
    <meta property="og:title" content="El mejor login e index que veras en tu vida">
    <meta property="og:description" content="Hecho por sus servilletas Edwin y Eduardo">
    <meta property="og:image" content="/img/gato.png">
    
    <title>Dashboard Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid px-4">
            
            <button class="btn btn-dark me-3 border-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarUsuarios" aria-controls="sidebarUsuarios">
                ☰ 
            </button>
            
            <a class="navbar-brand" href="#">Sistema de Administración</a>
            
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="navbarUsuario" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            👤 <span id="nombreUsuarioNav">Usuario</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="navbarUsuario">
                            <li><button id="btnCerrarSesion" class="dropdown-item text-danger">Salir del sistema</button></li>
                        </ul>
                    </li>
                </ul>
            </div>
            
        </div>
    </nav>

    <div class="offcanvas offcanvas-start bg-dark text-white shadow" tabindex="-1" id="sidebarUsuarios" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title" id="sidebarLabel">Menú Principal</h5>
            <button type="button" class="btn-close btn-close-white text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white dropdown-toggle" data-bs-toggle="collapse" href="#submenuCaptura" role="button" aria-expanded="false" aria-controls="submenuCaptura">
                        👥 Usuarios
                    </a>
                    <div class="collapse mt-2 px-3" id="submenuCaptura">
                        <div class="card card-body bg-secondary border-0 p-2 text-center">
                            <a href="#seccionCaptura" class="text-white text-decoration-none">Captura de Alumnos</a>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <div class="container mt-5">
        
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 text-center">
                <div class="card shadow-sm border-0">
                    <div class="card-body py-4">
                        <h1 class="display-6 fw-bold text-primary">¡Bienvenido!</h1>
                        <h2 id="mensajeBienvenida" class="text-muted mt-2 h5">Cargando datos...</h2>
                        <p class="mt-3 mb-0 text-secondary">Has accedido exitosamente a la página principal.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center" id="seccionCaptura">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Registro de Nuevo Alumno</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="formCaptura">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre del Alumno</label>
                                <input type="text" class="form-control" id="nombreAlumno" placeholder="Ej. Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="correoAlumno" placeholder="alumno@correo.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Contraseña</label>
                                <input type="password" class="form-control" id="passwordAlumno" required>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Número de Control</label>
                                    <input type="text" class="form-control" id="numControl" placeholder="6 dígitos" maxlength="6" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" id="fechaNacimiento" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2">Registrar Alumno</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEdad" tabindex="-1" aria-labelledby="modalEdadLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalEdadLabel">Validación de Edad</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <h3 id="resultadoEdad" class="fw-bold mb-3"></h3>
                    <p id="detalleAlumno" class="text-muted mb-0"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utileria.js"></script>
    <script src="js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
